<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>简单的HTML文件介绍</title>
</head>
<body>
    <h1>欢迎来到我的HTML页面</h1>
    <p>这是一个简单的HTML文件示例。HTML用于创建网页结构，包括标题、段落、图片和链接等内容。</p>
    <ul>
        <li>HTML文档以 <code>&lt;!DOCTYPE html&gt;</code> 开头</li>
        <li>主要结构包括 <code>&lt;html&gt;</code>、<code>&lt;head&gt;</code> 和 <code>&lt;body&gt;</code></li>
        <li>可以添加文本、图片、链接等元素</li>
    </ul>
</body>
</html>
